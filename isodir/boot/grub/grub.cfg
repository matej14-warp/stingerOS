set timeout=3
set default=0

menuentry "stinger OS" {
    multiboot /boot/kernel.elf
    
    ### MODULES_START ###
    module /notice.md "/notice.md"
    module /what-do-they-know.saf "/what-do-they-know.saf"
    module /wallpapers/wallpaper.ppm "/wallpapers/wallpaper.ppm"
    ### MODULES_END ###

    boot
}

menuentry "stinger OS (verbose)" {
    multiboot /boot/kernel.elf debug=1
    boot
}


